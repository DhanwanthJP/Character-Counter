<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Charater Counter</title>
    <link href="./src/output.css" rel="stylesheet">
</head>

<body>
    <div class="sticky top-0 w-full h-20 m-0 flex bg-gray-800 text-white shadow-2xl justify-around items-center">
        <h1 class="text-4xl">Character Counter</h1>
    </div>

    <div class="w-full h-screen bg-gray-200 text-black flex flex-col gap-10 justify-start p-36 items-center ">
        <div class="flex flex-row gap-5 justify-center">
            <h3 class="text-xl font-semibold font-mono">Set your character limit</h3>
            <input class="border rounded-md py-1 px-2 w-32" id="userLimit" type="number" placeholder="Max Limit">
        </div>

        <textarea class="h-70 w-2xl bg-white rounded-md p-3 border-2" name="text" id="textInput"
            maxlength="200"></textarea>
        <p class="text-xl font-semibold font-mono" id="output">Characters remaining: 200 / 200</p>
    </div>
    <script>
        var textInput = document.getElementById("textInput");
        var output = document.getElementById("output");
        var userLimit = document.getElementById("userLimit");

        var maxCount = 200; // default char limit
        textInput.setAttribute("maxlength", maxCount);

        //Update limit from user input
        userLimit.addEventListener("input", function () {
            if (userLimit.value === "") {
                maxCount = 200; // default
            } else {
                maxCount = Number(userLimit.value);
            }

            textInput.setAttribute("maxlength", maxCount);
            output.textContent = "Characters remaining: " + maxCount + " / " + maxCount;
        })

        //Character remaining
        textInput.addEventListener("keyup", function () {
            var textCount = textInput.value.length;

            if (textCount == maxCount) {
                alert(`Warning:  We caught you! \n Max limit reached.`);
            }
            
            if ((maxCount - textCount) < 0) {
                output.textContent = "Characters remaining: " + (maxCount - textCount) + " / " + maxCount+"\nDelete the extra characters above your specified limit";
            }else{
                output.textContent = "Characters remaining: " + (maxCount - textCount) + " / " + maxCount;
            }
        })


    </script>
</body>

</html>
